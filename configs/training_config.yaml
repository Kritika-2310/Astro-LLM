run_name: "astro-llm-r16-lr2e4-e3"

model:
  base_model_id: "meta-llama/Meta-Llama-3-8B-Instruct"
  load_in_4bit: true
  max_seq_length: 1024

data:
  train_path: "data/processed/train.jsonl"
  val_path: "data/processed/val.jsonl"
  prompt_template: "prompts/sagan_style_template.txt"

training:
  learning_rate: 2.0e-4
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  weight_decay: 0.0
  logging_steps: 5
  eval_strategy: "steps"
  eval_steps: 25
  save_strategy: "steps"
  save_steps: 25
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  early_stopping_patience: 3
  seed: 42

output:
  output_dir: "outputs/${run_name}"
  adapter_dir: "outputs/${run_name}/final_adapter"

tracking:
  report_to: "wandb"
  wandb_project: "astro-llm"

sweep_grid:
  rank: [8, 16, 32]
  learning_rate: [1.0e-4, 2.0e-4, 5.0e-4]
  num_train_epochs: [1, 3, 5]
